<!DOCTYPE html>
{% load static %}

<html lang="es">
<head>
    <meta charset="utf-8">

    <title>{% block title %}InnoBreed{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="shortcut icon" style="height:32px;" href="{% static 'images/logo-chico.png' %}" />

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="{% static 'vendors/ti-icons/css/themify-icons.css' %}">

    <link rel="shortcut icon" style="height:32px;" href="{% static 'images/logo-chico.png' %}" />

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #F5F7F6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 250px;
        }

        h4 {
            margin-bottom: 8px;
        }

        p {
            margin-bottom: 24px;
            color: #607D8B;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: #035426;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .menssageErr {
            background: #fdecea;
            border: 1px solid #c62828;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

}

    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <img src="{% static 'images/logo.png' %}" alt="AgroInnova" style="height:70px   width: auto;">
    </div>

    {% if messages %}
        <div class="menssageErr">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </div>
    {% endif %}

    <h4>¡Bienvenido de nuevo!</h4>
    <p>Ingresa tus credenciales para acceder al sistema</p>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Usuario</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            {{ form.password }}
        </div>

        <button class="btn" type="submit">Iniciar Sesión</button>
    </form>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll("input").forEach(i => {
            i.classList.add("form-control");
        });
    });
</script>

</body>
</html>
