{% load static %}
{% load i18n %}
<div class="row g-3">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="detalle-icon-box icon-azul mb-0">
                    <i class="mdi mdi-gender-female"></i>
                </div>
                <div>
                    <div class="mini-label">{% translate "Madre" %}</div>
                    <div class="mini-valor">{{ bovino.madre|default:"Desconocida" }}</div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="detalle-icon-box icon-verde mb-0">
                    <i class="mdi mdi-gender-male"></i>
                </div>
                <div>
                    <div class="mini-label">{% translate "Padre" %}</div>
                    <div class="mini-valor">{{ bovino.padre|default:"Desconocido" }}</div>
                </div>
            </div>
        </div>
    </div>
</div>
